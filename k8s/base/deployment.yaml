apiVersion: apps/v1
kind: Deployment
metadata:
  name: backstage-app
  namespace: backstage
  labels:
    app: backstage-app
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backstage-app
      version: v1
  template:
    metadata:
      labels:
        app: backstage-app
        version: v1
    spec:
      serviceAccountName: backstage-app-sa
      containers:
        - name: backstage-app
          image: 993326153624.dkr.ecr.ap-south-1.amazonaws.com/backstage:e4afc7bd8054fe7fe110bfc6f54e99f9a5dcc1c4
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80  # Changed from 3000 to 80 for nginx
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30  # Reduced from 60s
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10  # Reduced from 30s
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            limits:
              cpu: 200m      # Reduced for React app
              memory: 256Mi  # Reduced for React app
            requests:
              cpu: 100m      # Reduced for React app
              memory: 128Mi  # Reduced for React app
