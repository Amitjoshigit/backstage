name: CI-CD-ArgoCD
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION: "ap-south-1"
  ECR_REPOSITORY: "backstage"
  EKS_CLUSTER: "backstage"
  KUBERNETES_NAMESPACE: "backstage"

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image: ${{ steps.build-image.outputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'
          
      - name: Install dependencies
        run: yarn install --frozen-lockfile
        
      - name: Run tests
        run: yarn test --coverage --watchAll=false --passWithNoTests
        
      - name: Build application
        run: yarn build:backend --config ../../app-config.yaml
        
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::993326153624:role/backstage
          aws-region: ${{ env.AWS_REGION }}
          
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        
      - name: Build and push Docker image
        id: build-image
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG=${{ github.sha }}
          IMAGE_URI=$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          
          echo "Building image: $IMAGE_URI"
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI
          
          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT
          echo "Built and pushed: $IMAGE_URI"

  update-manifests:
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          
      - name: Verify manifest structure
        run: |
          echo "Checking Kubernetes manifests structure..."
          ls -la k8s/base/
          echo "Files in k8s/base/:"
          find k8s/base/ -name "*.yaml" -o -name "*.yml"
          
      - name: Update deployment manifest with new image
        run: |
          IMAGE=${{ needs.ci.outputs.image }}
          echo "Updating deployment with image: $IMAGE"
          
          # Update the image in deployment.yaml
          sed -i "s|image: 993326153624\.dkr\.ecr\.ap-south-1\.amazonaws\.com/backstage:.*|image: $IMAGE|" k8s/base/deployment.yaml
          
          echo "Updated deployment.yaml:"
          grep -A 2 -B 2 "image:" k8s/base/deployment.yaml
          
      - name: Commit and push manifest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add k8s/base/deployment.yaml
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🚀 Update deployment image to ${{ needs.ci.outputs.image }}"
            git push origin main
            echo "✅ Manifests updated and pushed - ArgoCD will sync automatically"
          fi

  create-argocd-app:
    needs: [ci, update-manifests]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::993326153624:role/backstage
          aws-region: ${{ env.AWS_REGION }}
          
      - name: Update EKS kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}
          echo "Connected to EKS cluster: ${{ env.EKS_CLUSTER }}"
          
      - name: Verify cluster connection
        run: |
          kubectl get nodes
          kubectl get namespaces | grep argocd || echo "ArgoCD namespace not found"
          
      - name: Create ArgoCD Application
        run: |
          cat > argocd-application.yaml << EOF
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: backstage-app
            namespace: argocd
            annotations:
              argocd.argoproj.io/sync-wave: "0"
          spec:
            project: default
            source:
              repoURL: https://github.com/Amitjoshigit/backstage
              targetRevision: main
              path: k8s/base
            destination:
              server: https://kubernetes.default.svc
              namespace: ${{ env.KUBERNETES_NAMESPACE }}
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - CreateNamespace=true
                - PrunePropagationPolicy=foreground
              retry:
                limit: 5
                backoff:
                  duration: 5s
                  factor: 2
                  maxDuration: 3m
          EOF
          
      - name: Apply ArgoCD Application
        run: |
          # Check if application already exists
          if kubectl get application backstage-app -n argocd >/dev/null 2>&1; then
            echo "ArgoCD application already exists, updating..."
            kubectl apply -f argocd-application.yaml
          else
            echo "Creating new ArgoCD application..."
            kubectl apply -f argocd-application.yaml
          fi
          
      - name: Wait for ArgoCD sync
        run: |
          echo "Waiting for ArgoCD to sync the application..."
          sleep 30
          
          # Check ArgoCD application status
          kubectl get application backstage-app -n argocd -o yaml
          
      - name: Verify deployment status
        run: |
          echo "=== CHECKING DEPLOYMENT STATUS ==="
          echo "ArgoCD Application Status:"
          kubectl get applications -n argocd
          
          echo "Backstage Namespace Resources:"
          kubectl get all -n ${{ env.KUBERNETES_NAMESPACE }} || echo "Namespace may not exist yet"
          
          echo "Recent Events in backstage namespace:"
          kubectl get events -n ${{ env.KUBERNETES_NAMESPACE }} --sort-by='.lastTimestamp' | tail -10 || echo "No events found"
          
      - name: Output deployment summary
        run: |
          echo "=== DEPLOYMENT SUMMARY ==="
          echo "✅ CI: Built and pushed image ${{ needs.ci.outputs.image }}"
          echo "✅ CD: Updated Kubernetes manifests in Git"
          echo "✅ ArgoCD: Application created/updated"
          echo ""
          echo "🔍 Next steps:"
          echo "1. Check ArgoCD UI at your ArgoCD dashboard"
          echo "2. Monitor application sync status"
          echo "3. Verify pods are running: kubectl get pods -n ${{ env.KUBERNETES_NAMESPACE }}"
          echo ""
          echo "📊 ArgoCD will automatically:"
          echo "- Detect the manifest changes"
          echo "- Deploy to EKS cluster"
          echo "- Keep the deployment in sync"
