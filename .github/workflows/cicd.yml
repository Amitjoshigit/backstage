name: CI-CD
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION: "ap-south-1"
  ECR_REPOSITORY: "backstage"
  EKS_CLUSTER: "backstage"
  KUBERNETES_NAMESPACE: "backstage"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Run tests
        run: yarn test --coverage --watchAll=false --passWithNoTests
      - name: Build application
        run: yarn build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: build/

  cd:
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::993326153624:role/backstage
          aws-region: ${{ env.AWS_REGION }}

      - name: Debug AWS credentials
        run: |
          aws sts get-caller-identity
          echo "AWS Region: ${{ env.AWS_REGION }}"
          echo "GitHub SHA: ${{ github.sha }}"

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Debug ECR Login
        run: |
          echo "ECR Registry from step: ${{ steps.login-ecr.outputs.registry }}"
          echo "GitHub SHA: ${{ github.sha }}"
          echo "GITHUB_SHA env: ${{ github.sha }}"

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        run: |
          # Use step output or fallback to hardcoded registry
          ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          if [ -z "$ECR_REGISTRY" ] || [ "$ECR_REGISTRY" = "null" ]; then
            ECR_REGISTRY="993326153624.dkr.ecr.ap-south-1.amazonaws.com"
          fi
          
          ECR_REPOSITORY="${{ env.ECR_REPOSITORY }}"
          IMAGE_TAG="${{ github.sha }}"
          
          # Fallback for IMAGE_TAG if empty
          if [ -z "$IMAGE_TAG" ]; then
            IMAGE_TAG="latest"
          fi
          
          echo "ECR Registry: $ECR_REGISTRY"
          echo "Repository: $ECR_REPOSITORY"
          echo "Image Tag: $IMAGE_TAG"
          echo "Full image: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Setup Helm
        uses: azure/setup-helm@v3

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Create ServiceAccount template if missing
        run: |
          # Ensure ServiceAccount template exists
          mkdir -p helm/templates
          if [ ! -f "helm/templates/serviceaccount.yaml" ]; then
            cat > helm/templates/serviceaccount.yaml << 'EOF'
          {{- if .Values.serviceAccount.create -}}
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: {{ include "backstage.serviceAccountName" . }}
            labels:
              {{- include "backstage.labels" . | nindent 4 }}
            {{- with .Values.serviceAccount.annotations }}
            annotations:
              {{- toYaml . | nindent 4 }}
            {{- end }}
          {{- end }}
          EOF
          fi

      - name: Ensure ServiceAccount helper exists
        run: |
          # Check if serviceAccountName helper exists in _helpers.tpl
          if ! grep -q "serviceAccountName" helm/templates/_helpers.tpl; then
            cat >> helm/templates/_helpers.tpl << 'EOF'

          {{- define "backstage.serviceAccountName" -}}
          {{- if .Values.serviceAccount.create }}
          {{- default (include "backstage.fullname" .) .Values.serviceAccount.name }}
          {{- else }}
          {{- default "default" .Values.serviceAccount.name }}
          {{- end }}
          {{- end }}
          EOF
          fi

      - name: Validate Helm chart
        run: |
          # Lint and validate the chart
          helm lint ./helm
          helm template my-app ./helm --dry-run > /dev/null

      - name: Deploy to EKS with Helm
        run: |
          IMAGE_FULL="${{ steps.build-image.outputs.image }}"
          IMAGE_REPO=$(echo "$IMAGE_FULL" | cut -d':' -f1)
          IMAGE_TAG=$(echo "$IMAGE_FULL" | cut -d':' -f2)
          
          echo "=== DEPLOYMENT DEBUG INFO ==="
          echo "IMAGE_FULL: $IMAGE_FULL"
          echo "IMAGE_REPO: $IMAGE_REPO"
          echo "IMAGE_TAG: $IMAGE_TAG"
          echo "NAMESPACE: ${{ env.KUBERNETES_NAMESPACE }}"
          echo "CLUSTER: ${{ env.EKS_CLUSTER }}"
          echo "============================"
          
          # Verify kubectl connection
          kubectl get nodes
          
          # Check if helm directory exists
          ls -la ./helm/
          
          # Deploy with longer timeout and better error handling
          helm upgrade --install my-app ./helm \
            --namespace ${{ env.KUBERNETES_NAMESPACE }} \
            --create-namespace \
            --set image.repository="$IMAGE_REPO" \
            --set image.tag="$IMAGE_TAG" \
            --set image.pullPolicy=Always \
            --wait \
            --timeout=15m \
            --debug

      - name: Verify deployment
        run: |
          echo "=== DEPLOYMENT STATUS ==="
          kubectl get pods -n ${{ env.KUBERNETES_NAMESPACE }}
          kubectl get svc -n ${{ env.KUBERNETES_NAMESPACE }}
          kubectl get ingress -n ${{ env.KUBERNETES_NAMESPACE }}
          
          echo "=== POD LOGS (if any failures) ==="
          kubectl get pods -n ${{ env.KUBERNETES_NAMESPACE }} --field-selector=status.phase!=Running --no-headers 2>/dev/null | \
          while read pod _; do
            if [ ! -z "$pod" ]; then
              echo "--- Logs for $pod ---"
              kubectl logs $pod -n ${{ env.KUBERNETES_NAMESPACE }} --tail=50 || true
            fi
          done

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed, checking rollback options..."
          helm rollback my-app -n ${{ env.KUBERNETES_NAMESPACE }} || echo "No previous release to rollback to"
